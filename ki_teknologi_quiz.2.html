<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI er allerede her</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0a0f2e; color: #fff; overflow: hidden; }

  .page { height: 100vh; display: flex; flex-direction: column; padding: 28px 44px 22px; gap: 18px; }

  .header { display: flex; align-items: flex-end; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 26px; font-weight: 700; line-height: 1.2; }
  .header h1 span { color: #5DCAA5; }
  .header small { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.40); display: block; margin-top: 4px; }
  .counter { text-align: right; }
  .counter strong { font-size: 32px; color: #5DCAA5; }
  .counter span { font-size: 12px; color: rgba(255,255,255,0.35); display: block; }

  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 8px;
    min-height: 0;
  }

  .card {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 12px 10px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .card:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
  .card.yes { background: rgba(29,158,117,0.18); border-color: #1D9E75; }
  .card.no  { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.06); opacity: 0.55; }

  .card-icon { font-size: 20px; line-height: 1; }
  .card-name { font-size: 11.5px; font-weight: 600; color: #fff; line-height: 1.3; }
  .card-ki { display: none; font-size: 9.5px; color: #5DCAA5; line-height: 1.45; margin-top: 2px; }
  .card.yes .card-ki { display: block; }

  .badge { display: none; position: absolute; top: 8px; right: 8px; background: #1D9E75; color: #fff; font-size: 8px; font-weight: 700; letter-spacing: 0.05em; padding: 2px 6px; border-radius: 20px; }
  .card.yes .badge { display: block; }

  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.05)} 100%{transform:scale(1)} }
  .popping { animation: pop 0.3s ease; }

  .footer { display: flex; align-items: center; justify-content: flex-start; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; }
  .hint { font-size: 11px; color: rgba(255,255,255,0.28); font-style: italic; }
  .btns { display: flex; gap: 10px; }
  .btn-all { background: transparent; border: 1.5px solid rgba(255,255,255,0.22); color: rgba(255,255,255,0.55); font-size: 12px; font-weight: 600; padding: 8px 18px; border-radius: 50px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .btn-all:hover { border-color: #5DCAA5; color: #5DCAA5; }

  .celebration { position: fixed; inset: 0; pointer-events: none; z-index: 50; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s; }
  .celebration.show { opacity: 1; }
  .cel-box { font-size: 20px; font-weight: 700; color: #5DCAA5; text-align: center; line-height: 1.6; background: rgba(10,15,46,0.94); padding: 28px 40px; border-radius: 16px; border: 2px solid #5DCAA5; box-shadow: 0 0 60px rgba(93,202,165,0.28); }
  .cel-box p { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.65); margin-top: 6px; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h1>Hvilke av disse har <span>KI innebygd</span>?
      <small>Klikk på de du tror, se hva som skjuler seg</small>
    </h1>
    <div class="counter">
      <strong id="count">0</strong>
      <span>av 23 har KI</span>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">
    <span class="hint">Klikk på kortene for å avsløre</span>
  </div>
</div>

<div class="celebration" id="cel">
  <div class="cel-box">
    23 av 25 har KI innebygd 🎯
    <p>KI er ikke på vei inn i livene deres.<br>Det er allerede der.</p>
  </div>
</div>

<script>
const tech = [
  { icon:"📱", name:"Mobiltelefon",          ki:true,  info:"Ansiktsgjenkjenning, prediktiv tekst, Siri/Google Assistant" },
  { icon:"📧", name:"E-post (Outlook/Gmail)", ki:true,  info:"Spam-filter, smart sortering, Copilot-forslag" },
  { icon:"🗺️", name:"Google Maps / GPS",      ki:true,  info:"Ruteoptimalisering, trafikk-prediksjon, ETA-beregning" },
  { icon:"💳", name:"Vipps / Bank",           ki:true,  info:"Svindeldeteksjon, atferdsanalyse, risikovurdering" },
  { icon:"☕", name:"Kaffeautomat",           ki:false, info:"" },
  { icon:"🎵", name:"Spotify / Strømming",    ki:true,  info:"Anbefalingsalgoritme, Discover Weekly, lydanalyse" },
  { icon:"💬", name:"Teams / Slack",          ki:true,  info:"Copilot, møtereferat, oversettelse, smart søk" },
  { icon:"🔍", name:"Google-søk",             ki:true,  info:"Gemini-svar, rangeringsalgoritme, bildesøk" },
  { icon:"🌤️", name:"Værmeldingsapp",         ki:true,  info:"Maskinlæring for lokale prognoser og nedbørsprediksjoner" },
  { icon:"🚂", name:"T-bane / tog",           ki:true,  info:"Dynamisk ruteoptimalisering, kapasitetsplanlegging, forsinkelsesprediksjoner" },
  { icon:"🚗", name:"Bil / cruisekontroll",   ki:true,  info:"Adaptiv cruisekontroll, filassistent, automatisk nødbrems" },
  { icon:"📚", name:"LMS (Canvas/Itslearning)",ki:true, info:"Tilpasset læringssti, automatisk tilbakemelding, fraværsanalyse" },
  { icon:"🗓️", name:"Kalender (Outlook)",     ki:true,  info:"Smart møteplanlegging, Copilot-sammendrag, reiseforslag" },
  { icon:"⌚", name:"Smartklokke",            ki:true,  info:"Hjerterytmeanalyse, fall-deteksjon, søvnanalyse, EKG" },
  { icon:"🏫", name:"Visma / Extens",         ki:true,  info:"Fraværsanalyse, prediktive rapporter, ressursallokering" },
  { icon:"📰", name:"Nyhetsapp (VG/NRK)",     ki:true,  info:"Personalisert feed, algoritmisk prioritering, leseranalyse" },
  { icon:"📊", name:"PowerPoint / Copilot",   ki:true,  info:"Designer, innholdsgenerering, Copilot i Microsoft 365" },
  { icon:"🔒", name:"BankID",                 ki:true,  info:"Atferdsanalyse, svindeldeteksjon, biometrisk verifisering" },
  { icon:"🛒", name:"Netthandel (Kolonial)",   ki:true,  info:"Personaliserte anbefalinger, dynamisk prising, etterfylling" },
  { icon:"🔊", name:"Smarthøytaler (Alexa)",  ki:true,  info:"Naturlig språkforståelse, kontekstuell læring, stemmegjenkjenning" },
  { icon:"📝", name:"Word / autokorrektur",   ki:true,  info:"Autokorrektur, grammatikksjekk, Copilot-skriveassistent" },
  { icon:"🖨️", name:"Skriveren på skolen",    ki:false, info:"" },
  { icon:"📡", name:"WiFi-ruteren",           ki:true,  info:"Trafikkoptimalisering, inntrengningsdeteksjon, prioritering" },
  { icon:"🔐", name:"Passordbehandler",       ki:true,  info:"Sikkerhetsanalyse, phishing-deteksjon, kompromittert passord-varsling" },
  { icon:"🎓", name:"Feide / pålogging",      ki:true,  info:"Atferdsanalyse, deteksjon av unormal innlogging, risikoscore" }
];

let count = 0;
const grid = document.getElementById('grid');
const countEl = document.getElementById('count');
const total = tech.filter(t => t.ki).length;

tech.forEach(t => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <span class="card-icon">${t.icon}</span>
    <span class="card-name">${t.name}</span>
    ${t.ki ? `<span class="badge">KI ✓</span><span class="card-ki">${t.info}</span>` : ''}
  `;
  card.addEventListener('click', () => {
    if (card.classList.contains('yes') || card.classList.contains('no')) return;
    card.classList.add(t.ki ? 'yes' : 'no', 'popping');
    card.addEventListener('animationend', () => card.classList.remove('popping'), { once: true });
    if (t.ki) {
      count++;
      countEl.textContent = count;
      if (count === total) {
        setTimeout(() => {
          const cel = document.getElementById('cel');
          cel.classList.add('show');
          setTimeout(() => cel.classList.remove('show'), 4000);
        }, 400);
      }
    }
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
